<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>People </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<h1>Person Info</h1>

<p th:text="'Name: ' + ${person.name()}"></p>
<p th:text="'born: ' + ${person.born()}"></p>

<div>
    <form th:action="@{/people/{id}/edit(id=${person.id()})}" th:method="GET">
        <button type="submit">edit</button>
    </form>

    <form th:action="@{/people/{id}(id=${person.id()})}" th:method="DELETE">
        <button type="submit">Delete</button>
    </form>
</div>


<div th:if="${person.books().isEmpty()} == true">
    <p>No books found</p>
</div>

<div th:if="${person.books().isEmpty()} == false">
    <div th:each="book : ${person.books()}">
        <p th:text="${book.name()} + ' ' + ${book.author()} + ' ' + ${book.createdAt()}"></p>
    </div>
</div>
</body>
</html>
